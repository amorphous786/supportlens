name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  # ════════════════════════════════════════════════════════════════════════════
  # STAGE 1 — Lint / Quality Gate
  # Pipeline stops here if lint or unit tests fail.
  # ════════════════════════════════════════════════════════════════════════════

  backend-lint-test:
    name: "Stage 1 · Backend — lint + unit tests"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt ruff

      - name: Lint — ruff
        run: ruff check app/

      - name: Unit tests — pytest
        run: pytest tests/ -v --tb=short
        env:
          OLLAMA_BASE_URL: http://localhost:11434
          DATABASE_URL: sqlite:///./ci_test.db

  frontend-lint-build:
    name: "Stage 1 · Frontend — type-check + build"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Type-check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
          NEXT_TELEMETRY_DISABLED: "1"

  # ════════════════════════════════════════════════════════════════════════════
  # STAGE 2 — Docker image builds
  # Validates both images build successfully from clean context.
  # ════════════════════════════════════════════════════════════════════════════

  docker-build:
    name: "Stage 2 · Docker image builds"
    runs-on: ubuntu-latest
    needs: [backend-lint-test, frontend-lint-build]

    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t supportlens-backend:ci ./backend

      - name: Build frontend image
        run: docker build -t supportlens-frontend:ci ./frontend

  # ════════════════════════════════════════════════════════════════════════════
  # STAGE 3 — End-to-end integration test
  #
  # Starts the full compose stack with a lightweight mock Ollama (no GPU,
  # no model pull required), then runs scripts/e2e_test.sh which:
  #   • Waits for /health to report healthy (db + backend + mock Ollama)
  #   • Creates a trace via POST /api/v1/traces/
  #   • Verifies analytics count increased
  #   • Verifies category filtering returns correct data
  #   • Tests short-path aliases: GET /traces and GET /analytics
  #   • Stops Ollama → asserts health degrades to "degraded"
  #   • Confirms read endpoints still work during LLM outage
  #   • Stops PostgreSQL (db) → asserts health reports "unhealthy"
  #   • Restarts db + backend → asserts full recovery
  # ════════════════════════════════════════════════════════════════════════════

  e2e:
    name: "Stage 3 · End-to-end tests"
    runs-on: ubuntu-latest
    needs: [docker-build]

    steps:
      - uses: actions/checkout@v4

      - name: Make e2e script executable
        run: chmod +x scripts/e2e_test.sh

      - name: Run E2E test suite
        run: bash scripts/e2e_test.sh
