services:

  # ── PostgreSQL database ──────────────────────────────────────────────────────
  # Stop with: docker compose stop db   → backend health reports "unhealthy"
  # Start with: docker compose start db  → then restart backend to reconnect
  db:
    image: postgres:16-alpine
    container_name: supportlens_db
    restart: unless-stopped
    environment:
      - POSTGRES_DB=supportlens
      - POSTGRES_USER=supportlens
      - POSTGRES_PASSWORD=supportlens
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U supportlens -d supportlens"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  # ── Ollama (local LLM runtime) ───────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: supportlens_ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "ollama list > /dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ── Backend (FastAPI) ────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: supportlens_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - DEBUG=false
      - LOG_LEVEL=INFO
      - DATABASE_URL=postgresql://supportlens:supportlens@db:5432/supportlens
      # Use the compose service name — host.docker.internal only works on Docker Desktop
      - OLLAMA_BASE_URL=http://ollama:11434
      - OLLAMA_MODEL=llama3
      - CORS_ORIGINS=http://localhost:3000
    depends_on:
      db:
        condition: service_healthy
      ollama:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  # ── Frontend (Next.js) ───────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: supportlens_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      backend:
        condition: service_healthy

volumes:
  db_data:
  ollama_data:
